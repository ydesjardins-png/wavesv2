<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mockup 1 — CSS-Only Fix — Waves Hero</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --deep:#0D0B1F; --teal:#1DE9C6; --cyan:#00E5FF; --lavender:#7B74F0;
    --periwinkle:#A09AF5; --gold:#FFD166; --white:#FFFFFF; --off-white:#F4F3FF;
    --font-display:'Plus Jakarta Sans',sans-serif; --font-body:'DM Sans',sans-serif;
  }
  html, body { height: 100%; }
  body { font-family: var(--font-body); background: var(--deep); color: var(--white); overflow-x: hidden; }

  .mockup-tag {
    position: fixed; top: 12px; right: 12px; z-index: 100;
    background: rgba(13,11,31,0.85); color: #fff;
    padding: 6px 12px; border-radius: 100px;
    font-family: var(--font-display); font-size: 0.7rem; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase;
    border: 1px solid rgba(255,255,255,0.15);
  }

  /* fake nav */
  .nav {
    position: absolute; top: 0; left: 0; right: 0; z-index: 10;
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 48px;
    background: rgba(13,11,31,0.5); backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .brand { display: flex; align-items: center; gap: 10px; font-family: var(--font-display); font-weight: 800; }
  .brand-mark { width: 30px; height: 30px; border-radius: 8px; background: linear-gradient(135deg, var(--lavender), var(--cyan)); display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 800; }
  .nav-cta { padding: 9px 18px; border-radius: 100px; background: linear-gradient(135deg, var(--lavender), var(--cyan)); color: var(--deep); font-weight: 700; text-decoration: none; font-family: var(--font-display); font-size: 0.88rem; }

  /* HERO — Mockup 1: narrow content + stronger overlay */
  .hero {
    min-height: 100vh; min-height: 100dvh;
    display: flex; align-items: center;
    padding: 120px 0 80px;
    position: relative;
    background-image: url('/hero-bg-v2.jpeg');
    background-size: cover; background-position: center center; background-repeat: no-repeat;
    overflow: hidden;
  }
  /* Stronger left gradient — darker and reaches further right */
  .hero::before {
    content: ''; position: absolute; inset: 0; z-index: 0;
    background:
      linear-gradient(95deg,
        rgba(13,11,31,0.92) 0%,
        rgba(13,11,31,0.85) 22%,
        rgba(13,11,31,0.55) 38%,
        rgba(13,11,31,0.15) 52%,
        rgba(13,11,31,0.00) 68%);
  }
  .hero::after {
    content: ''; position: absolute; inset: 0; z-index: 0; pointer-events: none;
    background:
      radial-gradient(ellipse 80% 30% at 50% 100%, rgba(13,11,31,0.55) 0%, transparent 70%),
      radial-gradient(ellipse 60% 22% at 50% 0%, rgba(13,11,31,0.35) 0%, transparent 70%);
  }
  .container { max-width: 1280px; margin: 0 auto; padding: 0 32px; position: relative; z-index: 1; }

  /* NARROWER content column — physically can't extend into bill zone */
  .hero-content { max-width: 460px; }

  .hero-eyebrow {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 7px 16px; border-radius: 100px;
    background: rgba(91,82,216,0.22);
    border: 1px solid rgba(160,154,245,0.32);
    backdrop-filter: blur(10px);
    font-size: 0.74rem; font-weight: 700; letter-spacing: 0.14em;
    color: var(--off-white); text-transform: uppercase; margin-bottom: 28px;
    font-family: var(--font-display);
  }
  .eyebrow-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--teal); box-shadow: 0 0 8px var(--teal); }

  /* SMALLER headline that fits the narrower lane */
  .hero-title {
    font-family: var(--font-display);
    font-size: clamp(2.2rem, 4vw, 3.4rem);
    font-weight: 800; line-height: 1.04;
    letter-spacing: -0.03em; margin-bottom: 22px;
    text-shadow: 0 2px 24px rgba(13,11,31,0.5);
  }
  .hero-title .line-accent {
    background: linear-gradient(96deg, var(--teal) 0%, var(--cyan) 55%, var(--lavender) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .hero-subtitle {
    font-size: 1.02rem; color: rgba(255,255,255,0.88);
    line-height: 1.55; margin-bottom: 32px; max-width: 420px;
    text-shadow: 0 1px 10px rgba(13,11,31,0.5);
  }
  .hero-subtitle strong { color: var(--white); font-weight: 700; }

  .hero-actions { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .btn-hero-primary {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 14px 24px; border-radius: 100px;
    background: linear-gradient(135deg, var(--teal) 0%, var(--cyan) 100%);
    color: var(--deep); font-family: var(--font-display);
    font-weight: 700; font-size: 0.96rem; text-decoration: none;
    box-shadow: 0 12px 32px rgba(0,229,255,0.35), inset 0 1px 0 rgba(255,255,255,0.5);
  }
  .btn-hero-ghost {
    padding: 13px 22px; border-radius: 100px;
    background: rgba(255,255,255,0.08); backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.18);
    color: var(--white); font-family: var(--font-display);
    font-weight: 600; font-size: 0.94rem; text-decoration: none;
  }

  .hero-proof {
    display: flex; align-items: center; gap: 18px;
    margin-top: 36px; padding-top: 24px;
    border-top: 1px solid rgba(255,255,255,0.14);
  }
  .proof-item { display: flex; flex-direction: column; gap: 2px; }
  .proof-num { font-family: var(--font-display); font-size: 1.2rem; font-weight: 800; line-height: 1.1; }
  .proof-num.gradient { background: linear-gradient(135deg, var(--white), var(--periwinkle)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .proof-num .stars-inline { color: var(--gold); font-size: 0.9rem; margin-right: 4px; }
  .proof-label { font-size: 0.7rem; color: rgba(255,255,255,0.65); font-weight: 500; }
  .proof-divider { width: 1px; height: 32px; background: rgba(255,255,255,0.14); }

  @media (max-width: 768px) {
    .nav { padding: 14px 20px; }
    .nav-cta { padding: 7px 14px; font-size: 0.82rem; }
    .container { padding: 0 20px; }
    .hero { align-items: flex-start; padding: 96px 0 120px; }
    .hero::before { background: linear-gradient(180deg, rgba(13,11,31,0.85) 0%, rgba(13,11,31,0.55) 28%, rgba(13,11,31,0.15) 50%, rgba(13,11,31,0) 75%); }
    .hero { background-image: url('/hero-bg-v2-mobile.webp'); background-position: center top; }
    .hero-content { max-width: 100%; }
    .hero-proof { gap: 16px; flex-wrap: wrap; }
    .proof-divider { display: none; }
  }
</style>
</head>
<body>

<div class="mockup-tag">Mockup 1 · CSS-Only</div>

<nav class="nav">
  <a href="#" class="brand"><span class="brand-mark">W</span> Waves Financial</a>
  <a href="#" class="nav-cta">Get a Loan →</a>
</nav>

<section class="hero">
  <div class="container">
    <div class="hero-content">
      <div class="hero-eyebrow"><span class="eyebrow-dot"></span> Licensed Canadian Lender</div>

      <h1 class="hero-title">
        Up to $1,000.<br>
        <span class="line-accent">Cash in 2 minutes.</span>
      </h1>

      <p class="hero-subtitle">
        <strong>No credit check.</strong> No paperwork. Apply in 5 minutes — funds arrive by Interac e-Transfer.
      </p>

      <div class="hero-actions">
        <a href="#" class="btn-hero-primary">Apply Now <span>→</span></a>
        <a href="#" class="btn-hero-ghost">How It Works</a>
      </div>

      <div class="hero-proof">
        <div class="proof-item">
          <span class="proof-num"><span class="stars-inline">★</span>4.9</span>
          <span class="proof-label">Google Reviews</span>
        </div>
        <div class="proof-divider"></div>
        <div class="proof-item">
          <span class="proof-num gradient">50,000+</span>
          <span class="proof-label">Canadians Helped</span>
        </div>
        <div class="proof-divider"></div>
        <div class="proof-item">
          <span class="proof-num">2 min</span>
          <span class="proof-label">Avg. e-Transfer</span>
        </div>
      </div>
    </div>
  </div>
</section>

</body>
</html>
